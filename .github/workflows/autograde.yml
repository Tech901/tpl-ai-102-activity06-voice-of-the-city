name: Autograding
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
  AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
  AZURE_AI_LANGUAGE_ENDPOINT: ${{ secrets.AZURE_AI_LANGUAGE_ENDPOINT }}
  AZURE_AI_LANGUAGE_KEY: ${{ secrets.AZURE_AI_LANGUAGE_KEY }}
  CLU_PROJECT_NAME: ${{ secrets.CLU_PROJECT_NAME }}
  CLU_DEPLOYMENT_NAME: ${{ secrets.CLU_DEPLOYMENT_NAME }}
  QA_PROJECT_NAME: ${{ secrets.QA_PROJECT_NAME }}
  QA_DEPLOYMENT_NAME: ${{ secrets.QA_DEPLOYMENT_NAME }}
  STUDENT_CORPUS_SEED: ${{ github.actor }}

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pre-run: python data/generate_audio.py
        run: python data/generate_audio.py
        continue-on-error: true

      - name: Run student code
        run: python -m app.main
        continue-on-error: true

      - name: Clone autograder
        uses: actions/checkout@v4
        with:
          repository: Tech901/ai102-autograder-tests
          token: ${{ secrets.AUTOGRADER_PAT }}
          path: .autograder

      # --- 28 tests, 100 points ---
      - name: "TestCanary::test_transcription_not_empty"
        id: test1
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TestCanary::test_transcription_not_empty"
          command: "python -m pytest .autograder/activity06-voice-of-the-city/test_hidden.py::TestCanary::test_transcription_not_empty -v --tb=short"
          timeout: "5"
          max-score: "4"

      - name: "TestCanary::test_translation_not_empty"
